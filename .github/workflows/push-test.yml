name: Build, Test & Lint

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Setup mxbuild
        run: ./bin/mxcli setup mxbuild --version 11.6.3
      - name: Integration tests
        run: make test-integration
        timeout-minutes: 30
      - name: Lint Go
        run: make lint-go
      - name: Check MDL example scripts
        run: |
          FAILED=0
          for f in mdl-examples/doctype-tests/*.mdl; do
            [[ "$f" == *.test.mdl ]] && continue
            NAME=$(basename "$f")
            echo "::group::$NAME"
            if ./bin/mxcli check "$f"; then
              echo "PASS: $NAME"
            else
              echo "::error file=$f::Syntax check failed: $NAME"
              FAILED=1
            fi
            echo "::endgroup::"
          done
          exit $FAILED
