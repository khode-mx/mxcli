name: Build, Test & Lint

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Lint Go
        run: make lint-go
